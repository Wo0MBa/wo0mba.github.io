<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Sniper Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">
                    🌀 WEATHER <span class="text-gradient">SNIPER</span> <span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded align-middle uppercase tracking-widest font-bold">Pro</span>
                </h1>
                <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest font-bold">Анализ METAR и Ансамблей Моделей в Реальном Времени</p>
            </div>
            <div id="lastUpdate" class="text-[10px] font-mono text-slate-500 bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                СИНХРОНИЗАЦИЯ...
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- Cards injected here -->
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            'Clear': 'Ясно',
            'Mainly Clear': 'Преимущественно ясно',
            'Partly Cloudy': 'Облачно',
            'Overcast': 'Пасмурно',
            'Fog': 'Туман',
            'Drizzle': 'Морось',
            'Rain': 'Дождь',
            'Showers': 'Ливень',
            'Thunderstorm': 'Гроза',
            'Unknown': 'Неизвестно',
            'Cloudy': 'Облачно'
        };

        async function loadData() {
            try {
                const response = await fetch('weather_data.json?t=' + Date.now());
                const data = await response.json();
                renderCards(data);
                const first = Object.values(data)[0];
                document.getElementById('lastUpdate').innerText = 'ОБНОВЛЕНО: ' + first.updated_at + ' (LOCAL)';
            } catch (e) { console.error(e); }
        }

        function renderCards(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const sorted = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0]));

            sorted.forEach(([name, info]) => {
                const spread = info.spread;
                const status = spread < 1.0 ? 'СТАБИЛЬНО' : (spread < 2.0 ? 'НЕСТАБИЛЬНО' : 'ХАОС');
                const color = spread < 1.0 ? 'emerald' : (spread < 2.0 ? 'amber' : 'rose');
                const w = info.weather;
                const ruCondition = TRANSLATIONS[w.condition] || w.condition;

                const card = document.createElement('div');
                card.className = `glass rounded-3xl p-5 transition-all duration-300 hover:border-slate-500 group`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-lg font-bold text-white group-hover:text-blue-400 transition-colors">${name}</h2>
                        <span class="text-[8px] font-black px-2 py-0.5 rounded bg-${color}-500/10 text-${color}-400 border border-${color}-500/20">${status}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-slate-900/40 rounded-2xl p-3">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">ФАКТ (METAR)</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-white">${info.metar_temp !== null ? info.metar_temp : '--'}</span>
                                <span class="text-xs text-slate-500 font-bold">°C</span>
                            </div>
                        </div>
                        <div class="bg-slate-900/40 rounded-2xl p-3 text-right">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">РАЗБРОС</p>
                            <div class="flex items-baseline justify-end gap-1">
                                <span class="text-3xl font-black text-${color}-400">${spread.toFixed(1)}</span>
                                <span class="text-xs text-slate-500 font-bold">°C</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-6 px-1">
                        <div class="text-center">
                            <p class="text-[7px] text-slate-500 uppercase font-bold">Облака</p>
                            <p class="text-xs font-bold text-slate-200">${w.clouds}%</p>
                        </div>
                        <div class="h-6 w-px bg-slate-800"></div>
                        <div class="text-center">
                            <p class="text-[7px] text-slate-500 uppercase font-bold">Влажность</p>
                            <p class="text-xs font-bold text-slate-200">${w.humidity}%</p>
                        </div>
                        <div class="h-6 w-px bg-slate-800"></div>
                        <div class="text-center">
                            <p class="text-[7px] text-slate-500 uppercase font-bold">Статус</p>
                            <p class="text-[9px] font-bold text-blue-400 leading-tight">${ruCondition}</p>
                        </div>
                    </div>

                    <div class="space-y-1.5 mb-6 px-1">
                        ${info.models.map(m => `
                            <div class="flex justify-between text-[9px] font-bold">
                                <span class="text-slate-500 font-mono">${m.name}</span>
                                <span class="text-slate-300">${m.temp.toFixed(1)}°C</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="text-[7px] font-mono text-slate-700 break-all opacity-30 group-hover:opacity-100 transition-opacity">
                        ${info.metar_raw || 'НЕТ ДАННЫХ METAR'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>

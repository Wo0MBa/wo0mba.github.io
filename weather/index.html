<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Sniper Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .grid-custom { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-white flex items-center gap-4">
                    <span class="text-blue-500">🌀</span> WEATHER <span class="text-gradient">SNIPER</span> <span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded uppercase tracking-widest font-bold">Pro</span>
                </h1>
                <p class="text-slate-500 text-sm mt-2 uppercase tracking-widest font-bold">Анализ METAR и Ансамблей моделей в реальном времени</p>
            </div>
            <div id="lastUpdate" class="text-[10px] font-mono text-slate-500 bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                СИНХРОНИЗАЦИЯ...
            </div>
        </header>

        <div id="grid" class="grid-custom gap-6">
            <!-- Карточки будут здесь -->
        </div>
        
        <footer class="mt-20 pt-10 border-t border-slate-900 flex justify-between items-center text-slate-600 text-[10px] uppercase tracking-widest font-bold">
            <div>Automation by wo0mba • 2026</div>
            <div class="flex gap-4">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Stable</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-amber-500"></span> Unstable</span>
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-rose-500"></span> Chaos</span>
            </div>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('weather_data.json?t=' + Date.now());
                const data = await response.json();
                renderCards(data);
                
                const firstCity = Object.values(data)[0];
                document.getElementById('lastUpdate').innerText = 'ПОСЛЕДНЯЯ СИНХРОНИЗАЦИЯ: ' + firstCity.updated_at + ' (MSK)';
            } catch (e) {
                console.error('Data load failed', e);
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            // Сортировка по алфавиту
            const sorted = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0]));

            sorted.forEach(([name, info]) => {
                const spread = info.spread;
                const status = spread < 1.0 ? 'СТАБИЛЬНО' : (spread < 2.0 ? 'НЕСТАБИЛЬНО' : 'ХАОС');
                const color = spread < 1.0 ? 'emerald' : (spread < 2.0 ? 'amber' : 'rose');
                
                const card = document.createElement('div');
                card.className = `glass border border-slate-800 rounded-3xl p-6 transition-all duration-500 hover:border-slate-600 hover:bg-slate-900/50 group`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <h2 class="text-2xl font-bold text-white group-hover:text-blue-400 transition-colors">${name}</h2>
                        <span class="text-[9px] font-black px-2 py-0.5 rounded bg-${color}-500/10 text-${color}-400 border border-${color}-500/20">${status}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-10">
                        <div class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800/50">
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black mb-1">Факт (METAR)</p>
                            <div class="flex items-baseline gap-1">
                                <span class="text-4xl font-black text-white">${info.metar_temp !== null ? info.metar_temp : '--'}</span>
                                <span class="text-sm text-slate-500 font-bold">°C</span>
                            </div>
                        </div>
                        <div class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800/50 text-right">
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black mb-1">Разброс (Spread)</p>
                            <div class="flex items-baseline justify-end gap-1">
                                <span class="text-4xl font-black text-${color}-400">${spread.toFixed(1)}</span>
                                <span class="text-sm text-slate-500 font-bold">°C</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 mb-8 px-2">
                        ${info.models.length > 0 ? info.models.map(m => `
                            <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider">
                                <span class="text-slate-500">${m.name}</span>
                                <span class="text-slate-300">${m.temp.toFixed(1)}°C</span>
                            </div>
                        `).join('') : '<p class="text-[10px] text-slate-700 italic">Данные моделей временно недоступны</p>'}
                    </div>

                    <div class="text-[8px] font-mono text-slate-700 break-all opacity-40 group-hover:opacity-100 transition-opacity">
                        ${info.metar_raw || 'НЕТ ДАННЫХ АЭРОПОРТА'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Sniper Alpha Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bucket-cell { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-badge { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">
    <div class="max-w-[1600px] mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">
                    🌀 ALPHA <span class="text-gradient">SNIPER</span> <span class="text-[10px] bg-rose-600 text-white px-2 py-0.5 rounded align-middle uppercase tracking-widest font-bold text-center">Live</span>
                </h1>
                <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest font-bold text-blue-400/80">Structural Anomalies & Smart Money Indicators</p>
            </div>
            <div id="lastUpdate" class="text-[10px] font-mono text-slate-500 bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                СИНХРОНИЗАЦИЯ...
            </div>
        </header>

        <div id="city-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('weather_data.json?t=' + Date.now());
                const data = await response.json();
                renderCards(data);
                const first = Object.values(data)[0];
                document.getElementById('lastUpdate').innerText = 'ОБНОВЛЕНО: ' + first.updated_at + ' (MSK)';
            } catch (e) { console.error(e); }
        }

        function renderCards(data) {
            const container = document.getElementById('city-container');
            container.innerHTML = Object.entries(data).map(([name, info]) => {
                const edgeColor = info.edge === 'NEUTRAL' ? 'slate' : 'rose';
                const skyEmoji = info.sky === 'CLEAR' ? '☀️' : (info.sky === 'OVERCAST' ? '☁️' : '⛅');
                
                return `
                    <div class="glass rounded-3xl p-6 transition-all duration-300 hover:border-slate-500 group relative">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-2xl font-black text-white tracking-tight">${name}</h2>
                                <p class="text-[10px] font-mono text-slate-500 uppercase">${info.icao}</p>
                            </div>
                            <div class="status-badge bg-${edgeColor}-500/10 text-${edgeColor}-400 border border-${edgeColor}-500/20">
                                ${info.edge}
                            </div>
                        </div>

                        <div class="bg-slate-900/40 rounded-2xl p-4 border border-white/5 mb-6">
                            <div class="flex justify-between items-baseline">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase font-black mb-1">Факт</p>
                                    <div class="flex items-baseline gap-1">
                                        <span class="text-5xl font-black text-white leading-none">${info.temp !== null ? info.temp : '--'}</span>
                                        <span class="text-base text-slate-500 font-black">°C</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl">${skyEmoji}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">${info.sky}</p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mb-6">
                            <div class="bucket-cell rounded-xl p-3">
                                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Polymarket Fav</p>
                                <p class="text-sm font-black text-white leading-none">${info.poly_fav}</p>
                                <p class="text-xs font-bold text-blue-500 mt-1">${(info.poly_price * 100).toFixed(1)}c</p>
                            </div>
                            <div class="bucket-cell rounded-xl p-3">
                                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Dew Point Gap</p>
                                <p class="text-sm font-black text-white leading-none">${info.dew_gap}°C</p>
                                <p class="text-[10px] text-slate-400 mt-1">Wind: ${info.wind}</p>
                            </div>
                        </div>

                        ${info.edge !== 'NEUTRAL' ? `
                            <div class="bg-rose-500/10 border border-rose-500/20 rounded-xl p-3">
                                <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-1">🎯 TRADE SIGNAL</p>
                                <p class="text-[11px] font-bold text-slate-200 leading-tight">Физика подтверждает ${info.edge}. Рынок может ошибаться.</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
